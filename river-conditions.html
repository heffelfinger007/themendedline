<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>River Conditions</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --green: #4ade80;
      --yellow: #facc15;
      --red: #f87171;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: .25rem;
      letter-spacing: -0.02em;
    }
    .subtitle {
      color: var(--muted);
      font-size: .95rem;
      margin-bottom: 2rem;
    }
    .updated {
      color: var(--muted);
      font-size: .8rem;
      margin-bottom: 1.5rem;
    }
    .gauge-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .gauge-name {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: .15rem;
    }
    .gauge-region {
      color: var(--muted);
      font-size: .8rem;
      margin-bottom: 1rem;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }
    .metric {
      text-align: center;
    }
    .metric-label {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: .25rem;
    }
    .metric-value {
      font-size: 1.5rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .metric-unit {
      font-size: .75rem;
      color: var(--muted);
      font-weight: 400;
    }
    .metric-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-top: .35rem;
      overflow: hidden;
    }
    .metric-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }
    .loading {
      color: var(--muted);
      font-size: .9rem;
      text-align: center;
      padding: 2rem;
    }
    .error {
      color: var(--red);
      font-size: .85rem;
      text-align: center;
      padding: 1rem;
      background: rgba(248, 113, 113, 0.1);
      border-radius: 8px;
      margin-bottom: 1rem;
    }
    .chart-link {
      display: inline-block;
      color: var(--accent);
      font-size: .8rem;
      text-decoration: none;
      margin-top: .75rem;
      padding: .35rem .75rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: background 0.2s;
    }
    .chart-link:hover {
      background: rgba(56, 189, 248, 0.1);
    }
    @media (max-width: 600px) {
      .container { padding: 1.25rem .75rem; }
      h1 { font-size: 1.4rem; }
      .metrics { grid-template-columns: repeat(3, 1fr); gap: .5rem; }
      .metric-value { font-size: 1.2rem; }
      .gauge-card { padding: 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>River Conditions</h1>
    <p class="subtitle">Real-time stream gauge data from the USGS</p>
    <p class="updated" id="updated"></p>
    <div id="gauges"></div>
  </div>
  <script>
    const GAUGES = [
      { id: '03566535', name: 'North Chickamauga Creek', region: 'TN @ Thrasher Pike', regionCode: 'TN' },
      { id: '03518500', name: 'Tellico River', region: 'TN @ Tellico Plains', regionCode: 'TN' },
      { id: '03424860', name: 'Caney Fork', region: 'TN @ Columbia', regionCode: 'TN' },
      { id: '13037500', name: 'South Fork Snake River', region: 'ID @ Heise', regionCode: 'ID' },
    ];

    const BAR_CONFIG = {
      discharge: { min: 0, max: 5000, color: '#38bdf8', label: 'Flow' },
      gauge: { min: 0, max: 20, color: '#a78bfa', label: 'Height' },
      precip: { min: 0, max: 0.5, color: '#4ade80', label: 'Precip' },
    };

    function formatNum(n) {
      if (n == null || n === 'NaN') return '—';
      return Number(n).toLocaleString('en-US', { maximumFractionDigits: 1 });
    }

    function barWidth(value, config) {
      const pct = Math.min(100, Math.max(0, ((value - config.min) / (config.max - config.min)) * 100));
      return `${pct}%`;
    }

    function renderGauge(gauge, data) {
      const { discharge, gaugeHeight, dailyPrecip } = data;
      const d = discharge || {};
      const gh = gaugeHeight || {};
      const p = dailyPrecip || {};

      const dischargeVal = d.value != null ? Number(d.value) : null;
      const gaugeVal = gh.value != null ? Number(gh.value) : null;
      const precipVal = p.value != null ? Number(p.value) : null;

      const dTime = d.dateTime ? new Date(d.dateTime) : null;
      const ghTime = gh.dateTime ? new Date(gh.dateTime) : null;
      const pTime = p.dateTime ? new Date(p.dateTime) : null;

      const timeStr = [dTime, ghTime, pTime].filter(Boolean).reduce((a, b) => b > a ? b : a);
      const timeLabel = timeStr ? timeStr.toLocaleString('en-US', {
        month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true
      }) : '';

      return `
        <div class="gauge-card">
          <div class="gauge-name">${gauge.name}</div>
          <div class="gauge-region">${gauge.region}</div>
          <div class="metrics">
            <div class="metric">
              <div class="metric-label">Discharge</div>
              <div class="metric-value">${formatNum(dischargeVal)} <span class="metric-unit">CFS</span></div>
              <div class="metric-bar"><div class="metric-bar-fill" style="width:${barWidth(dischargeVal, BAR_CONFIG.discharge)};background:${BAR_CONFIG.discharge.color}"></div></div>
            </div>
            <div class="metric">
              <div class="metric-label">Gauge Height</div>
              <div class="metric-value">${formatNum(gaugeVal)} <span class="metric-unit">ft</span></div>
              <div class="metric-bar"><div class="metric-bar-fill" style="width:${barWidth(gaugeVal, BAR_CONFIG.gauge)};background:${BAR_CONFIG.gauge.color}"></div></div>
            </div>
            <div class="metric">
              <div class="metric-label">24hr Precip</div>
              <div class="metric-value">${formatNum(precipVal)} <span class="metric-unit">in</span></div>
              <div class="metric-bar"><div class="metric-bar-fill" style="width:${barWidth(precipVal, BAR_CONFIG.precip)};background:${BAR_CONFIG.precip.color}"></div></div>
            </div>
          </div>
          ${timeLabel ? `<div class="updated" style="margin-top:.5rem">Updated: ${timeLabel}</div>` : ''}
          <a class="chart-link" href="https://waterdata.usgs.gov/monitoring-location/${gauge.id}/?parameter_code=00010,00065,00060" target="_blank" rel="noopener">USGS Chart →</a>
        </div>
      `;
    }

    async function fetchGaugeData(gauge) {
      const [dischargeRes, gaugeRes, precipRes] = await Promise.all([
        fetch(`https://nwis.waterservices.usgs.gov/nwis/dv?format=json&timestamp=true&startDT=2026-04-17&endDT=2026-04-18&sites=${gauge.id}&parameterCd=00060`),
        fetch(`https://nwis.waterservices.usgs.gov/nwis/iv?format=json&timestamp=true&sites=${gauge.id}&parameterCd=00065`),
        fetch(`https://nwis.waterservices.usgs.gov/nwis/dv?format=json&timestamp=true&startDT=2026-04-17&endDT=2026-04-18&sites=${gauge.id}&parameterCd=00060`),
      ]);

      const [dischargeData, gaugeData, precipData] = await Promise.all([dischargeRes.json(), gaugeRes.json(), precipRes.json()]);
      return { discharge: parseValue(dischargeData), gaugeHeight: parseValue(gaugeData), dailyPrecip: parseValue(precipData) };
    }

    function parseValue(data) {
      if (!data || !data.valueTimeSeries || data.valueTimeSeries.length === 0) return null;
      const vt = data.valueTimeSeries[0];
      const v = vt.value[0];
      return {
        value: v.value,
        dateTime: vt.sourceInfo?.stationName || vt.timeZoneInfo?.timeZoneCd || vt.dateTime,
        dateTime: vt.dateTime,
      };
    }

    async function init() {
      const container = document.getElementById('gauges');
      const updatedEl = document.getElementById('updated');
      container.innerHTML = '<div class="loading">Loading river conditions…</div>';

      const results = await Promise.allSettled(GAUGES.map(g => fetchGaugeData(g)));
      const now = new Date();
      updatedEl.textContent = `Page loaded: ${now.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true })}`;

      container.innerHTML = results.map((r, i) => {
        if (r.status === 'fulfilled') return renderGauge(GAUGES[i], r.value);
        return `<div class="gauge-card"><div class="gauge-name">${GAUGES[i].name}</div><div class="error">Failed to load data. <a href="https://waterdata.usgs.gov/gage-data/${GAUGES[i].id}.txt" target="_blank" rel="noopener">View on USGS →</a></div></div>`;
      }).join('');
    }

    init();
  </script>
</body>
</html>
