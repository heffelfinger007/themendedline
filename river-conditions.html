<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>River Conditions</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: .25rem;
      letter-spacing: -0.02em;
    }
    .subtitle {
      color: var(--muted);
      font-size: .95rem;
      margin-bottom: 2rem;
    }
    .updated {
      color: var(--muted);
      font-size: .8rem;
      margin-bottom: 1.5rem;
    }
    .gauge-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }
    .gauge-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .gauge-name {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: .15rem;
    }
    .gauge-region {
      color: var(--muted);
      font-size: .8rem;
    }
    .gauge-iframe {
      width: 100%;
      height: 320px;
      border: none;
    }
    .gauge-footer {
      padding: .75rem 1.25rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
    }
    .chart-link {
      color: var(--accent);
      font-size: .8rem;
      text-decoration: none;
      padding: .35rem .75rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: background 0.2s;
    }
    .chart-link:hover {
      background: rgba(56, 189, 248, 0.1);
    }
    .error {
      color: var(--text);
      font-size: .85rem;
      text-align: center;
      padding: 2rem;
    }
    @media (max-width: 600px) {
      .container { padding: 1.25rem .75rem; }
      h1 { font-size: 1.4rem; }
      .gauge-header { padding: .85rem 1rem; }
      .gauge-iframe { height: 240px; }
      .gauge-footer { padding: .6rem 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>River Conditions</h1>
    <p class="subtitle">Stream gauge data from the USGS</p>
    <p class="updated" id="updated"></p>
    <div id="gauges"></div>
  </div>
  <script>
    const GAUGES = [
      { id: '03566535', name: 'North Chickamauga Creek', region: 'TN @ Thrasher Pike' },
      { id: '03518500', name: 'Tellico River', region: 'TN @ Tellico Plains' },
      { id: '03424860', name: 'Caney Fork', region: 'TN @ Columbia' },
      { id: '13037500', name: 'South Fork Snake River', region: 'ID @ Heise' },
    ];

    function renderGauge(gauge) {
      const chartUrl = `https://waterdata.usgs.gov/monitoring-location/${gauge.id}/#/parameter_code/00065,00060,00010/period/7`;
      const iframeUrl = `https://waterdata.usgs.gov/nwisweb/graph?agency_cd=USGS&site_no=${gauge.id}&parm_cd=00065,00060,00010&period=7`;

      return `
        <div class="gauge-card">
          <div class="gauge-header">
            <div class="gauge-name">${gauge.name}</div>
            <div class="gauge-region">${gauge.region}</div>
          </div>
          <iframe class="gauge-iframe" src="${iframeUrl}" loading="lazy" referrerpolicy="no-referrer"></iframe>
          <div class="gauge-footer">
            <a class="chart-link" href="${chartUrl}" target="_blank" rel="noopener">Full USGS Data →</a>
          </div>
        </div>
      `;
    }

    const container = document.getElementById('gauges');
    const updatedEl = document.getElementById('updated');
    const now = new Date();
    updatedEl.textContent = `Last checked: ${now.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true })}`;
    container.innerHTML = GAUGES.map(g => renderGauge(g)).join('');
  </script>
</body>
</html>
